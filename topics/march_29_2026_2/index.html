<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Digital Human 2030: An Interactive Data Story</title>
    
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for Editorial Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Feather Icons for lightweight iconography -->
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        /* Custom Theme & Typography */
        :root {
            --brand-cyan: #22d3ee;
            --brand-purple: #c084fc;
            --brand-rose: #fb7185;
            --brand-emerald: #34d399;
            --brand-blue: #60a5fa;
            --brand-green: #4ade80;
            --brand-orange: #fb923c;
            --brand-yellow: #facc15;
            --brand-indigo: #818cf8;
        }

        body {
            font-family: 'Lora', serif;
            background-color: #f8fafc; /* slate-50 */
            color: #0f172a; /* slate-900 */
            overflow-x: hidden;
        }

        h1, h2, h3, .font-serif-display { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'Space Mono', monospace; }

        /* Scrollytelling Mechanics */
        .step-card {
            transition: opacity 0.7s ease, transform 0.7s ease;
            opacity: 0.15;
            transform: translateY(30px);
        }
        .step-card.is-active {
            opacity: 1;
            transform: translateY(0);
        }

        /* SVG Visualization Transitions */
        svg * {
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .viz-group {
            opacity: 0;
            pointer-events: none;
        }
        .viz-group.active-state {
            opacity: 1;
        }

        /* Specific Animation States */
        /* Macro */
        #viz-macro circle.ring { r: 50; }
        #viz-macro.active-state circle.ring { r: 250; }
        #viz-macro circle.dashed-ring { r: 0; }
        #viz-macro.active-state circle.dashed-ring { r: 150; }
        
        /* Network */
        #viz-network line { stroke-dasharray: 500; stroke-dashoffset: 500; }
        #viz-network.active-state line { stroke-dashoffset: 0; }
        #viz-network circle.node { r: 0; }
        #viz-network.active-state circle.node { r: 35; }
        
        /* UHI Architecture */
        #viz-uhi .walled-garden { transform: translateX(-50px); }
        #viz-uhi.active-state .walled-garden { transform: translateX(0); }
        #viz-uhi .open-protocol { transform: translateX(50px); }
        #viz-uhi.active-state .open-protocol { transform: translateX(0); }
        
        /* Bar Race */
        #viz-bar-race rect.bar { width: 0; }
        #viz-bar-race.active-state rect.bar-reliance { width: 400px; }
        #viz-bar-race.active-state rect.bar-adani { width: 360px; }
        #viz-bar-race.active-state rect.bar-swadeshi { width: 150px; }

        /* Mandala */
        #viz-mandala circle.outer-ring { r: 60; }
        #viz-mandala.active-state circle.outer-ring { r: 260; }

        /* Responsive Layout Tweaks */
        @media (max-width: 768px) {
            #graphic-container {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: 0;
            }
            #text-container {
                position: relative;
                z-index: 10;
                padding-top: 50vh;
            }
            .step-card {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(0,0,0,0.05);
            }
        }
    </style>
</head>

    <script>

        const STORY_STEPS = [
            {
                id: 'intro', vizId: 'viz-macro', icon: ICONS.globe,
                title: 'The Digital Metamorphosis',
                content: `By 2030, the traditional "mobile application" is dead. In its place: proactive, autonomous agents that mediate reality. Apps will no longer merely facilitate consumption—they will be strictly essential for biological health, financial survival, and climate adaptation.<br><br>In India, the app economy is projected to reach a staggering <span class="font-bold font-sans px-1 bg-cyan-100 text-slate-900 rounded"> $800 billion </span>, representing nearly 12% of the nation's GDP. Driven by a massive middle class and over 1 billion internet users, the direct mobile app market revenue alone will hit $27.67 billion.`
            },
            {
                id: 'ai-agents', vizId: 'viz-network', icon: ICONS.cpu,
                title: 'The AI Chief of Staff',
                content: `Manual screen navigation is archaic. The most indispensable application will be your "Personal AI Chief of Staff." It triages communications, negotiates meetings, and executes transactions autonomously using ultra-fast 5G.<br><br>This cognitive offloading could deliver <span class="font-bold font-sans px-1 bg-purple-100 text-slate-900 rounded"> $13 trillion </span> in global economic activity. Simultaneously, the AI Companion Market will surge to $140.75 billion, acting as personalized therapists to bridge a projected global shortage of 11 million health workers.`
            },
            {

                title: 'Biological Sovereignty',
                content: `Applications will transcend diagnostics to become physically augmentative. The Global Digital Health market is soaring to $565.23 billion.<br><br>Biohacking and cognitive enhancement—tracking multimodal biometrics, genomic profiling, and neuromodulation—will reach <span class="font-bold font-sans px-1 bg-rose-100 text-slate-900 rounded"> $69.09 billion </span>. Extreme transhumanist projections foresee CRISPR integration, making cellular repair applications a baseline requirement for physical competitiveness.`

        // 1. Generate Narrative HTML
        const container = document.getElementById('narrative-content');
        STORY_STEPS.forEach((step, index) => {
            const article = document.createElement('article');
            article.className = 'step-card mb-[60vh] relative';
            article.dataset.stepIndex = index;
            article.dataset.vizId = step.vizId;
            
            // Format step number (01, 02, etc.)
            const stepNum = (index + 1).toString().padStart(2, '0');

            article.innerHTML = `
                <div class="bg-white/95 backdrop-blur-sm p-8 md:p-10 border-t-4 border-slate-900 shadow-2xl rounded-sm relative z-10">
                    <div class="absolute -top-10 -left-6 text-8xl font-black font-sans text-slate-100 select-none z-0 tracking-tighter mix-blend-multiply">${stepNum}</div>
                    <div class="relative z-10">
                        ${step.icon}
                        <h2 class="text-3xl font-black font-serif-display mb-6 leading-tight text-slate-900">
                            ${step.title}
                        </h2>
                        <p class="text-lg text-slate-700 leading-relaxed font-serif">
                            ${step.content}
                        </p>
                    </div>
                </div>
            `;
            container.appendChild(article);
        });

        // Initialize Feather Icons
        feather.replace();

        // 2. Generate Mandala Rays (JS Injection for SVG loops)
        const mandalaGroup = document.getElementById('mandala-rays');
        for (let i = 0; i < 22; i++) {
            const angle = (i * (360 / 22) * Math.PI) / 180;
            const x1 = 400 + Math.cos(angle) * 60;
            const y1 = 400 + Math.sin(angle) * 60;
            const x2 = 400 + Math.cos(angle) * 240;
            const y2 = 400 + Math.sin(angle) * 240;
            
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1); line.setAttribute("y1", y1);
            line.setAttribute("x2", x2); line.setAttribute("y2", y2);
            line.setAttribute("class", "stroke-indigo-500 stroke-[1.5px] opacity-0");
            line.style.transition = `all 1s cubic-bezier(0.4, 0, 0.2, 1) ${i * 0.05}s`;
            
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", x2); circle.setAttribute("cy", y2);
            circle.setAttribute("r", "4");
            circle.setAttribute("class", "fill-cyan-400 opacity-0");
            circle.style.transition = `opacity 0.5s ${1 + (i*0.05)}s`;

            mandalaGroup.appendChild(line);
            mandalaGroup.appendChild(circle);
        }
        
        // CSS rule injected via JS for mandala rays animation
        const style = document.createElement('style');
        style.innerHTML = `
            #viz-mandala.active-state #mandala-rays line { stroke-dasharray: 200; stroke-dashoffset: 0; opacity: 1; }
            #viz-mandala #mandala-rays line { stroke-dasharray: 200; stroke-dashoffset: 200; opacity: 0; }
            #viz-mandala.active-state #mandala-rays circle { opacity: 1; }
        `;
        document.head.appendChild(style);


        // 3. Scrollytelling Intersection Observer
        const stepCards = document.querySelectorAll('.step-card');
        const vizGroups = document.querySelectorAll('.viz-group');

        const updateVisuals = (vizId) => {
            // Hide all graphics
            vizGroups.forEach(g => g.classList.remove('active-state'));
            
            // Show specific graphic
            const activeViz = document.getElementById(vizId);
            if (activeViz) activeViz.classList.add('active-state');
        };

        const observerOptions = {
            root: null,
            rootMargin: '-40% 0px -40% 0px', // Triggers when the card is in the middle 20% of the screen
            threshold: 0
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    // Update Text Active State
                    stepCards.forEach(card => card.classList.remove('is-active'));
                    entry.target.classList.add('is-active');
                    
                    // Update Visual Active State
                    const targetVizId = entry.target.dataset.vizId;
                    updateVisuals(targetVizId);
                }
            });
        }, observerOptions);

        stepCards.forEach(card => observer.observe(card));

        // Initial setup: activate first viz
        updateVisuals('viz-macro');
        stepCards[0].classList.add('is-active');

    </script>
